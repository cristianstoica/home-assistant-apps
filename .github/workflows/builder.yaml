name: Builder

env:
  # Trigger tokens matched as `${app}/${file}` substrings against the
  # changed-files list. `pysyslog` / `pyddns` / `pyweather` are the package
  # source dirs (one per add-on, slug-minus-hyphen) so a Python-only change under
  # `py-syslog/pysyslog/`, `py-ddns/pyddns/`, or `py-weather/pyweather/` triggers a
  # rebuild — without them, source-only edits silently skip the image build.
  MONITORED_FILES: "config.json config.yaml config.yml Dockerfile rootfs pysyslog pyddns pyweather"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  init:
    name: Initialize builds
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      changed_apps: ${{ steps.filter.outputs.changed_apps }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v47

      - name: Find app directories
        id: apps
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Filter changed apps
        id: filter
        env:
          APPS: ${{ steps.apps.outputs.addons }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          changed_apps=()

          # On manual dispatch, rebuild all apps.
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            changed_apps=(${APPS})
          # If the workflow file itself changed, rebuild all apps
          elif [[ "${CHANGED_FILES}" =~ \.github/workflows/(builder|build-app)\.yaml ]]; then
            changed_apps=(${APPS})
          else
            for app in ${APPS}; do
              for file in ${MONITORED_FILES}; do
                if [[ "${CHANGED_FILES}" =~ ${app}/${file} ]]; then
                  changed_apps+=("${app}")
                  break
                fi
              done
            done
          fi

          if [[ ${#changed_apps[@]} -gt 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_apps=$(jq -nc '$ARGS.positional' --args "${changed_apps[@]}")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-app:
    name: Build ${{ matrix.app }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.init.outputs.changed_apps) }}
    uses: ./.github/workflows/build-app.yaml
    with:
      app: ${{ matrix.app }}
      publish: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    secrets: inherit
