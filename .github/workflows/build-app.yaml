name: Build app

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      publish:
        required: true
        type: boolean

jobs:
  prepare:
    name: Prepare
    if: github.repository == 'cristianstoica/home-assistant-apps'
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.app }}"

      - name: Normalize app information
        id: normalize
        env:
          IMAGE: ${{ steps.info.outputs.image }}
          VERSION: ${{ steps.info.outputs.version }}
          APP_NAME: ${{ steps.info.outputs.name }}
          APP_DESCRIPTION: ${{ steps.info.outputs.description }}
          APP_URL: ${{ steps.info.outputs.url }}
        # The home-assistant info helper emits values as JSON scalars (e.g.
        # "1.0.0" with literal quotes for strings, null for missing fields),
        # so we strip a single surrounding pair of double quotes from each
        # string value before writing it back to the step output.
        run: |
          strip_quotes() {
            local v="$1"
            if [[ "${v:0:1}" == "\"" && "${v: -1}" == "\"" && ${#v} -ge 2 ]]; then
              v="${v#\"}"
              v="${v%\"}"
            fi
            printf '%s' "${v}"
          }

          image="$(strip_quotes "${IMAGE}")"
          version="$(strip_quotes "${VERSION}")"
          app_name="$(strip_quotes "${APP_NAME}")"
          app_description="$(strip_quotes "${APP_DESCRIPTION}")"
          app_url="$(strip_quotes "${APP_URL}")"

          {
            echo "image_name=${image##*/}"
            echo "registry_prefix=${image%/*}"
            echo "version=${version}"
            echo "name=${app_name}"
            echo "description=${app_description}"
            if [[ -n "${app_url}" && "${app_url}" != "null" ]]; then
              echo "url=${app_url}"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          container-registry-username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          context: "./${{ inputs.app }}"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          container-registry-username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}
