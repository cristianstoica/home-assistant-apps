name: "Weather Verify"
version: "0.8.1"
slug: wxverify
description: "Verify weather-forecast accuracy via cluster-consensus ground truth"
url: "https://github.com/cristianstoica/home-assistant-apps/tree/main/wxverify"
arch:
  - aarch64
  - amd64
startup: services
init: false
backup: cold
image: "ghcr.io/cristianstoica/wxverify"
ingress: true
ingress_stream: true
panel_icon: mdi:weather-partly-cloudy
panel_title: "Weather Verify"
discovery:
  - wxverify
options:
  log_level: info
  meteoblue_key: ""
  weathercom_key: ""
  visualcrossing_key: ""
  openweathermap_key: ""
  weatherapi_key: ""
  meteosource_key: ""
  google_key: ""
  rolling_window_days: 30
  min_n: 30
  forecast_blend_depth: 2
  obs_interval_minutes: 180
  obs_jitter_minutes: 20
  min_interval_seconds: 300
  max_backoff_seconds: 86400
  request_timeout_seconds: 30
  weathercom_daily_call_limit: 3000
  monitor_pipeline: true
  monitor_budget: true
  monitor_db: true
schema:
  log_level: list(debug|info|warning|error)
  meteoblue_key: password?
  weathercom_key: password?
  visualcrossing_key: password?
  openweathermap_key: password?
  weatherapi_key: password?
  meteosource_key: password?
  google_key: password?
  rolling_window_days: int(1,3650)
  min_n: int(0,100000)
  forecast_blend_depth: int(1,6)
  obs_interval_minutes: int(30,1440)
  obs_jitter_minutes: int(0,120)
  min_interval_seconds: int(60,1800)
  max_backoff_seconds: int(60,86400)
  request_timeout_seconds: int(1,300)
  weathercom_daily_call_limit: int(1,20000)
  monitor_pipeline: bool
  monitor_budget: bool
  monitor_db: bool
