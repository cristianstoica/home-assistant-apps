name: "Weather Verify"
version: "0.1.2"
slug: wxverify
description: "Verify weather-forecast accuracy via cluster-consensus ground truth"
url: "https://github.com/cristianstoica/home-assistant-apps/tree/main/wxverify"
arch:
  - aarch64
  - amd64
startup: services
init: false
image: "ghcr.io/cristianstoica/wxverify"
ingress: true
panel_icon: mdi:weather-partly-cloudy
panel_title: "Weather Verify"
options:
  log_level: info
  meteoblue_key: ""
  weathercom_key: ""
  visualcrossing_key: ""
  openweathermap_key: ""
  weatherapi_key: ""
  meteosource_key: ""
  google_key: ""
  rolling_window_days: 30
  min_n: 30
  obs_interval_minutes: 180
  obs_jitter_minutes: 20
  monitor_pipeline: true
  monitor_budget: true
  monitor_db: true
schema:
  log_level: list(debug|info|warning|error)
  meteoblue_key: password?
  weathercom_key: password?
  visualcrossing_key: password?
  openweathermap_key: password?
  weatherapi_key: password?
  meteosource_key: password?
  google_key: password?
  rolling_window_days: int(1,3650)
  min_n: int(0,100000)
  obs_interval_minutes: int(30,1440)
  obs_jitter_minutes: int(0,120)
  monitor_pipeline: bool
  monitor_budget: bool
  monitor_db: bool
