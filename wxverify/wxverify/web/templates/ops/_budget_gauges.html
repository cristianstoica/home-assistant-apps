<section class="panel">
  <h2>Budget Gauges</h2>
  <p class="panel-hint">Daily API call and credit usage against each provider's limit.</p>
  {% for row in budgets %}
    <div class="gauge-row">
      <div>
        <strong>{{ row.source }}</strong>
        <span>{{ row.calls }} / {{ row.daily_call_limit }} calls{% if row.daily_credit_limit %} - {{ row.credits }} / {{ row.daily_credit_limit }} credits{% endif %}</span>
      </div>
      <meter min="0" max="{{ row.daily_call_limit }}" value="{{ row.calls }}"></meter>
    </div>
  {% endfor %}
</section>
