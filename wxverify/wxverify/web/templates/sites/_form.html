<section class="create-site" aria-labelledby="create-site-title">
  <h2 id="create-site-title">Create Site</h2>
  <p class="panel-hint">Add a location to verify: its forecast point, timezone, and rain threshold.</p>
  <form
    id="site-create-form"
    class="grid-form"
    hx-post="{{ url('/api/sites') }}"
    hx-ext="json-enc"
    hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'
    hx-target="#site-cards"
    hx-swap="outerHTML">
    <label>
      Name
      <input name="name" required autocomplete="off">
    </label>
    <label>
      Latitude
      <input name="forecast_lat" type="number" step="0.000001" required>
    </label>
    <label>
      Longitude
      <input name="forecast_lon" type="number" step="0.000001" required>
    </label>
    <label>
      Elevation m
      <input name="elevation_m" type="number" step="0.1" required>
    </label>
    <label>
      Timezone
      <input name="timezone" required value="UTC">
    </label>
    <label>
      Rain threshold mm
      <input name="rain_threshold_mm" type="number" step="0.1" min="0" value="0.2">
    </label>
    <button type="submit">Create site</button>
  </form>
</section>
