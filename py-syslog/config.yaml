name: Py-Syslog
version: "1.3.0"
slug: py-syslog
description: >-
  Durable UDP syslog collector. Receives RFC 3164/5424 datagrams, resolves each
  sender to a site/host, writes one daily-rotated, gzip-compressed, retained
  file under /data/log. Collector only.
url: https://github.com/cristianstoica/home-assistant-apps/tree/main/py-syslog
arch: [aarch64, amd64]
startup: system
init: false
host_network: true
image: ghcr.io/cristianstoica/py-syslog
options:
  listen_port: 5514
  listen_host: 0.0.0.0
  retention_days: 30
  # Size guard (ring buffer) — all default 0 = disabled. To enable either
  # percentage guard you MUST also set max_segment_mb > 0 (without intra-day
  # segments there is nothing to prune).
  min_free_percent: 0
  max_log_percent: 0
  max_segment_mb: 0
  log_level: info
  # Map each sender IP to a (site, host) stamped on every collected line.
  # Add your own rows via the HA add-on Configuration tab, e.g.:
  #   - { ip: 192.0.2.1, site: home, host: router1 }
  # Senders not listed are still received and written, stamped unknown/<ip>.
  sources: []
schema:
  listen_port: port
  listen_host: str
  retention_days: int(1,3650)
  min_free_percent: int(0,99)
  max_log_percent: int(0,99)
  max_segment_mb: int(0,4096)
  log_level: list(debug|info|warning|error)
  sources:
    - { ip: str, site: str, host: str }
