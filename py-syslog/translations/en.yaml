configuration:
  listen_port:
    name: Listen port
    description: >-
      UDP port to bind on the host network. Point each device's syslog
      forwarding at the Home Assistant host on this port (default 5514).
  retention_days:
    name: Retention (days)
    description: >-
      Days of gzipped archives to keep; older ones are pruned. Retention is
      time-bounded by the date in each archive's filename, not byte-capped.
  log_level:
    name: Diagnostics verbosity
    description: >-
      Verbosity of Py-Syslog's own diagnostics (startup line, periodic stats,
      and warnings) on stderr. This does NOT filter the syslog collected from
      your sources — every received datagram is stored and shown in full,
      whatever its severity. Setting it to debug additionally traces each
      received datagram's parse and resolution decision.
  sources:
    name: Source mappings
    description: >-
      IP → (site, host) resolution table stamped on every collected line. A
      duplicate ip is rejected. Senders not listed here are still received and
      stored, stamped unknown/<ip>.
