configuration:
  max_backoff_seconds:
    name: Maximum backoff / terminal hold (seconds)
    description: >-
      The slow holding cadence (cap) for a terminally-unhealthy station — a
      non-retryable config/token fault is held at this interval rather than spun
      in a tight retry loop (60-86400).
  min_interval_seconds:
    name: Minimum poll interval (seconds)
    description: >-
      Floor for the auto-learned poll interval. Even a fast-uploading station is
      polled no more often than this, bounding Weather.com API load. The learned
      interval is clamp(observed_period * 0.8, minimum, 1800) plus ±15% jitter
      (60-1800; the upper bound is the fixed healthy-slow-uploader ceiling).
  settle_seconds:
    name: Settle / re-read interval (seconds)
    description: >-
      The wait after an update_entity refresh before each station's /states
      read, and the spacing between the startup discovery attempts (1-300). Long
      enough for a Weather.com render to land, short enough to stay responsive.
  startup_stagger_seconds:
    name: Cold-start stagger (seconds)
    description: >-
      The delay between each station's first poll at launch, to avoid an
      all-at-once request burst across the fleet (1-300).
  request_timeout_seconds:
    name: Request timeout (seconds)
    description: >-
      Per-call timeout for the Supervisor Core-API proxy calls (1-300). A hung
      socket becomes a transient failure (backoff), never a stuck poll.
  log_level:
    name: Diagnostics verbosity
    description: >-
      Verbosity of Py-Weather's own diagnostics (startup, station registration,
      cadence transitions) on stderr. debug additionally traces each routine
      healthy poll. The Supervisor bearer token is never logged at any level.
  stations:
    name: Stations
    description: >-
      The Weather.com PWS stations to poll. Each row's key is the lowercase
      alphanumeric station id (the entity-id suffix); update_entity is that
      station's representative sensor, sensor.wu_obstimeutc_<key> for new rows
      (the sensor read for the station's online/offline state) — the registry
      sensor.rest_wu_* unique-id form is rejected, and a sensor.wu_temp_<key>
      representative is still accepted for back-compat. Leave this list empty to
      auto-populate once: on first start the add-on discovers stations from your
      existing sensor.wu_obstimeutc_* entities, writes them back here, and
      thereafter behaves as a plain manual list (edit or remove rows as normal).
    fields:
      key:
        name: Station key
        description: >-
          The lowercase-alphanumeric station id, e.g. istation01. Interpolated
          into both the update_entity check and the sensor discovery, so it must
          match ^[a-z0-9]+$ (no underscores, uppercase, or punctuation).
      update_entity:
        name: Representative entity
        description: >-
          The representative sensor refreshed each poll, e.g.
          sensor.wu_obstimeutc_istation01. Must match sensor.wu_<metric>_<key>
          for this row's key — the registry sensor.rest_wu_* form is rejected.
