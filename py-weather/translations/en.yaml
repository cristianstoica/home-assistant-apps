configuration:
  healthy_interval_min:
    name: Healthy interval minimum (seconds)
    description: >-
      Lower bound of the fast cadence window. After a positively-confirmed poll,
      the next poll is scheduled at a random value in [minimum, maximum] seconds,
      jittering the station fleet so they do not poll in lockstep (60-86400).
  healthy_interval_max:
    name: Healthy interval maximum (seconds)
    description: >-
      Upper bound of the fast cadence window (60-86400). Must be greater than or
      equal to the minimum.
  initial_backoff_seconds:
    name: Initial backoff / holding cadence (seconds)
    description: >-
      The slow cadence a station starts at (cold start) and holds at on an
      inconclusive-but-accepted poll, and the base of exponential backoff: the
      first transient-unhealthy retry waits twice this value (60-86400). No fast
      first poll is assumed — a station earns the fast cadence on its first
      confirmed poll.
  max_backoff_seconds:
    name: Maximum backoff (seconds)
    description: >-
      The cap on exponential backoff, and the slow holding cadence used after a
      terminal (config/token) fault (60-86400). Must be greater than or equal to
      the initial backoff.
  settle_seconds:
    name: Settle / re-read interval (seconds)
    description: >-
      The wait after an update_entity refresh before the first states read, and
      the spacing between the bounded freshness re-reads (1-300). Long enough for
      a Weather.com render to land, short enough to stay responsive.
  startup_stagger_seconds:
    name: Cold-start stagger (seconds)
    description: >-
      The delay between each station's first poll at launch, to avoid an
      all-at-once request burst across the fleet (1-300).
  request_timeout_seconds:
    name: Request timeout (seconds)
    description: >-
      Per-call timeout for the Supervisor Core-API proxy calls (1-300). A hung
      socket becomes a transient failure (backoff), never a stuck poll.
  log_level:
    name: Diagnostics verbosity
    description: >-
      Verbosity of Py-Weather's own diagnostics (startup, station registration,
      backoff transitions) on stderr. debug additionally traces each routine
      healthy poll. The Supervisor bearer token is never logged at any level.
  stations:
    name: Stations
    description: >-
      The Weather.com PWS stations to poll. Each row's key is the lowercase
      alphanumeric station id (the entity-id suffix); update_entity is that
      station's representative sensor and must be sensor.wu_temp_<key> (never the
      registry sensor.rest_wu_* unique-id form); expected_sensors is a soft signal
      — a discovered count short of it is logged, not treated as unhealthy.
    fields:
      key:
        name: Station key
        description: >-
          The lowercase-alphanumeric station id, e.g. istation01. Interpolated
          into both the update_entity check and the sensor discovery, so it must
          match ^[a-z0-9]+$ (no underscores, uppercase, or punctuation).
      update_entity:
        name: Representative entity
        description: >-
          The representative sensor refreshed each poll, e.g.
          sensor.wu_temp_istation01. Must match sensor.wu_temp_<key> for this
          row's key — the registry sensor.rest_wu_* form is rejected.
      expected_sensors:
        name: Expected sensor count
        description: >-
          The number of sensors this station normally exposes (a positive
          integer). A discovered count below this is logged as a soft signal; only
          a missing or unusable required-core sensor (temp/humidity/pressure)
          marks the station unhealthy.
