name: Py-Weather
version: "0.4.0"
slug: py-weather
description: >-
  Adaptive poller for Weather.com PWS REST sensors. Forces a refresh of one
  representative sensor per station via homeassistant.update_entity through the
  Supervisor Core-API proxy, judges each station online/offline from its obsTimeUtc,
  and adapts the cadence: a learned per-station interval (with jitter) when online,
  a daily re-probe when offline, a slow hold when terminal. Holds no Weather.com
  secret.
url: https://github.com/cristianstoica/home-assistant-apps/tree/main/py-weather
arch: [aarch64, amd64]
init: false
homeassistant_api: true
hassio_api: true
image: ghcr.io/cristianstoica/py-weather
options:
  # Slow holding cadence (cap) for a terminal-unhealthy station: a non-retryable
  # config/token fault is held at this interval, never spun in a tight retry loop.
  max_backoff_seconds: 86400
  # Floor for the learned poll interval. Even a 1-minute uploader is polled no
  # more often than this, bounding WU API load. The learned interval is
  # clamp(observed_period * 0.8, min_interval_seconds, 1800) + ±15% jitter.
  # Bounded 60-1800: the upper bound is the fixed 1800s healthy-slow-uploader
  # ceiling (it must not exceed it, or the clamp ceiling would be voided).
  min_interval_seconds: 300
  # Settle wait before each station's /states read after an update_entity POST,
  # and the spacing between the startup discovery attempts.
  settle_seconds: 15
  # Cold-start stagger between the first poll of each station, to avoid an
  # all-at-once request burst at launch.
  startup_stagger_seconds: 10
  # Per-call HTTP timeout for the Core-API proxy calls.
  request_timeout_seconds: 30
  log_level: info
  # The Weather.com PWS stations to poll. `key` is the lowercase-alphanumeric
  # station id (the entity-id suffix); `update_entity` is that station's
  # representative sensor — use sensor.wu_obstimeutc_<key> for new rows (the
  # sensor read for the station's online/offline state), never the registry
  # sensor.rest_wu_* unique-id form. A sensor.wu_temp_<key> representative is
  # still accepted for back-compat (the validator's metric segment is generic),
  # so existing rows need not change. Fill this in on the add-on Configuration
  # tab with your own stations; one row per station, e.g.:
  #   - key: istation01
  #     update_entity: sensor.wu_obstimeutc_istation01
  stations: []
schema:
  max_backoff_seconds: int(60,86400)
  min_interval_seconds: int(60,1800)
  settle_seconds: int(1,300)
  startup_stagger_seconds: int(1,300)
  request_timeout_seconds: int(1,300)
  log_level: list(debug|info|warning|error)
  stations:
    - key: str
      update_entity: str
