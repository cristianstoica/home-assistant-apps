name: Py-Weather
version: "0.1.1"
slug: py-weather
description: >-
  Adaptive poller for Weather.com PWS REST sensors. Forces a refresh of one
  representative sensor per station via homeassistant.update_entity through the
  Supervisor Core-API proxy, judges per-station freshness/health, and adapts each
  station's cadence: a randomized fast interval when confirmed, exponential
  backoff when transient, a slow hold when terminal. Holds no Weather.com secret.
url: https://github.com/cristianstoica/home-assistant-apps/tree/main/py-weather
arch: [aarch64, amd64]
init: false
homeassistant_api: true
image: ghcr.io/cristianstoica/py-weather
options:
  # Healthy (positively-confirmed) cadence window: each confirmed poll schedules
  # the next at a random value in [min, max] seconds, jittering the station
  # fleet so they do not all poll in lockstep.
  healthy_interval_min: 300
  healthy_interval_max: 400
  # Exponential backoff for a transient-unhealthy station: the first retry is
  # initial_backoff_seconds * 2, doubling each subsequent failure, capped at
  # max_backoff_seconds. initial_backoff_seconds is also the cold-start / inconclusive
  # holding cadence (no fast first poll is assumed; a confirmed poll earns it).
  initial_backoff_seconds: 300
  max_backoff_seconds: 86400
  # Initial settle wait before the first /states read after an update_entity POST,
  # and the spacing between the bounded freshness re-reads.
  settle_seconds: 15
  # Cold-start stagger between the first poll of each station, to avoid an
  # all-at-once request burst at launch.
  startup_stagger_seconds: 10
  # Per-call HTTP timeout for the Core-API proxy calls.
  request_timeout_seconds: 30
  log_level: info
  # The Weather.com PWS stations to poll. `key` is the lowercase-alphanumeric
  # station id (the entity-id suffix); `update_entity` is that station's
  # representative sensor (must be sensor.wu_temp_<key>, never the registry
  # sensor.rest_wu_* unique-id form); `expected_sensors` is a soft, logged
  # signal — a discovered count short of it is logged, not fatal. Fill this in
  # on the add-on Configuration tab with your own stations; one row per station,
  # e.g.:
  #   - key: istation01
  #     update_entity: sensor.wu_temp_istation01
  #     expected_sensors: 10
  stations: []
schema:
  healthy_interval_min: int(60,86400)
  healthy_interval_max: int(60,86400)
  initial_backoff_seconds: int(60,86400)
  max_backoff_seconds: int(60,86400)
  settle_seconds: int(1,300)
  startup_stagger_seconds: int(1,300)
  request_timeout_seconds: int(1,300)
  log_level: list(debug|info|warning|error)
  stations:
    - key: str
      update_entity: str
      expected_sensors: int(1,)
